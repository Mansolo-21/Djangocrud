{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>{% block title %}Title{% endblock %}</title>
</head>
<body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary ">
  <div class="container-fluid bg-primary fs-2 p-2 mx-6">
    <a class="navbar-brand" href="#">
      <img src="{% static 'img/logo.jpeg'%}" alt="Logo" width="70" height="60
      " class="d-inline-block align-text-top rounded">
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarSupportedContent">
      <ul class="navbar-nav me-auto mb-6 mb-lg-0">
        {%if user.is_authenticated %}
        <li class="nav-item">
          <span>Welcome {{user.username}}
        </li>
        <li class="nav-item">
          <a class="nav-link active" aria-current="page" href="{% url 'user'%}">Dashboard</a>
        </li>
        <li class="nav-item">
          <a class="nav-link active" aria-current="page" href="{% url 'index'%}">Home</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="{%url 'add'%}">Add Student</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="{%url 'register'%}">Register User</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="{%url 'students'%}">Admin</a>
        </li> 
        <li class="nav-item">
          <a class="nav-link" href="{%url 'login'%}">Login</a>
        </li> 
          
          
      
       {%endif%}
      </ul>
    
    </div>
  </div>
</nav>
<main>
    {%block content%}

    {% endblock %}
</main>








<footer>
    <p class="text center">&copy; 2026 All rights reserved </p>
  </footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
