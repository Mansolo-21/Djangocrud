{% extends "base.html" %}
{% block title %}Register{% endblock %}
{%block content%}
<div class="container">
    <div class="row justify-content-center">
        <div class="col mb-6">
            <h1 class="text-success text center"> Register User</h1>
                <form method="POST" class="card card-body shadow p-3">
                     {% csrf_token %}
                     {{form.as_p}}
                    <button type="submit" class="btn btn-secondary">Register User</button>
                </form>
        </div>
    </div>
</div>
{%endblock%}
