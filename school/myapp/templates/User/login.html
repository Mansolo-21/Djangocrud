{% extends "base.html" %}
{% block title %}Login{% endblock %}
{%block content%}
<div class="container">
    <div class="row justify-content-center">
        <div class="col mb-6">
        <h1 class="text-success text center"> Login</h1>
            <form method="POST" class="card card-body shadow p-3">
            {% csrf_token %}
             {{form.as_p}}
              <button type="submit" class="btn btn-secondary">Login User</button>
               <p class="text-center">Don't have an account?<a href="{%url 'register'%}">Register</a></p>
            </form>
        </div>
    </div>
</div>
{%endblock%}
